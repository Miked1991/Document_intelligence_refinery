# Production-grade configuration with full escalation rules
version: "2.1"
environment: "production"

# Escalation configuration
escalation:
  rules:
    LEVEL_1_FAST:
      min_confidence: 0.7
      max_retries: 1
      timeout_seconds: 120
      fallback_to: "LEVEL_2_LAYOUT"
    
    LEVEL_2_LAYOUT:
      min_confidence: 0.8
      max_retries: 2
      timeout_seconds: 300
      fallback_to: "LEVEL_3_VISION"
      cost_threshold: 0.05
    
    LEVEL_3_VISION:
      min_confidence: 0.85
      max_retries: 3
      timeout_seconds: 600
      fallback_to: "LEVEL_4_HUMAN"
      cost_threshold: 0.10
    
    LEVEL_4_HUMAN:
      min_confidence: 0.95
      max_retries: 0
      timeout_seconds: 3600
      fallback_to: null
  
  global_timeout: 3600
  max_escalation_depth: 4
  parallel_attempts: false
  cache_results: true
  cache_ttl_seconds: 3600
  
  # Confidence thresholds for different actions
  thresholds:
    acceptable: 0.7      # Minimum acceptable confidence
    good: 0.8            # Good confidence
    excellent: 0.9       # Excellent confidence
    escalate: 0.6        # Below this, escalate immediately
    critical_failure: 0.4 # Below this, consider document corrupted
  
  # Strategy-specific overrides
  strategy_overrides:
    LEVEL_1_FAST:
      max_pages: 500
      min_character_density: 0.0003
      min_chars_per_page: 100
    
    LEVEL_2_LAYOUT:
      gpu_required: false
      batch_size: 4
      model: "mineru"
      table_recognition: true
      formula_recognition: true
    
    LEVEL_3_VISION:
      models: 
        - "google/gemini-flash-1.5"
        - "openai/gpt-4o-mini"
      max_retries_per_page: 2
      image_quality: 95
      dpi: 300

# Extraction strategies configuration
extraction:
  fast_text:
    enabled: true
    tool: "pdfplumber"
    config:
      extract_tables: true
      extract_words: true
      line_scale: 50
      layout_scale: 50
      min_confidence: 0.7
  
  layout:
    enabled: true
    tool: "mineru"
    mineru_config:
      device: "cuda"  # or "cpu"
      batch_size: 4
      layout_model: "doclayout_yolo"
      formula_enabled: true
      table_recognition: true
      min_confidence: 0.8
  
  vision:
    enabled: true
    models:
      primary: "google/gemini-flash-1.5"
      fallback: "openai/gpt-4o-mini"
    min_confidence: 0.85
    prompts:
      extraction: |
        Extract all text, tables, and figures from this document page.
        Return a JSON object with:
        - text_blocks: list of {text, bbox [x1,y1,x2,y2]}
        - tables: list of {headers: [str], rows: [[str]], bbox}
        - figures: list of {caption: str, bbox}
        - reading_order: list of indices in order.
        Use precise coordinates normalized 0-1000.

# Confidence scoring configuration
confidence:
  signal_weights:
    character_density: 0.15
    font_consistency: 0.10
    table_completeness: 0.20
    reading_order_coherence: 0.15
    language_model_perplexity: 0.10
    ocr_confidence: 0.15
    layout_stability: 0.05
    cross_page_consistency: 0.05
    entity_recognition_confidence: 0.03
    numerical_precision: 0.02
  
  thresholds:
    character_density:
      expected: 0.0005
      min_chars_per_page: 100
    
    table_completeness:
      min_rows: 2
      min_cols: 2
      acceptable_completeness: 0.85
    
    reading_order:
      min_coherence: 0.7
      min_continuity: 0.6

# Budget management
budget:
  limits:
    per_document_cap_usd: 0.05
    per_page_cap_usd: 0.001
    hourly_cap_usd: 1.00
    daily_cap_usd: 5.00
    weekly_cap_usd: 25.00
    monthly_cap_usd: 100.00
    project_cap_usd: 1000.00
  
  grace_periods:
    per_document: 0
    per_page: 0
    hourly: 300
    daily: 3600
    weekly: 86400
    monthly: 172800
    project: 259200
  
  model_pricing:
    google/gemini-flash-1.5:
      prompt_per_token: 0.000000075
      completion_per_token: 0.00000030
      image_cost_per_page: 0.00014
    
    openai/gpt-4o-mini:
      prompt_per_token: 0.00000015
      completion_per_token: 0.00000060
      image_cost_per_page: 0.00014